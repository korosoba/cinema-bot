services:
  - type: worker
    name: cinema-news-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CHECK_INTERVAL_HOURS
        value: "3"
      - key: HOT_THRESHOLD
        value: "6"
